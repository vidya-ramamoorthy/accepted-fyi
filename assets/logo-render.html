<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1080px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }
    .logo {
      width: 1080px;
      height: 1080px;
      border-radius: 50%;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.1);
      gap: 4px;
    }
    .accepted {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 148px;
      color: #ffffff;
      letter-spacing: -4px;
      line-height: 1;
    }
    .fyi {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 148px;
      background: linear-gradient(135deg, #a78bfa, #818cf8, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -4px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="accepted">accepted</div>
    <div class="fyi">.fyi</div>
  </div>
</body>
</html>
