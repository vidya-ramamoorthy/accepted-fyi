<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="fyiGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="checkGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="35" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark slate background -->
  <circle cx="200" cy="200" r="200" fill="#0f172a"/>

  <!-- Subtle gradient blobs -->
  <circle cx="140" cy="130" r="70" fill="#7c3aed" opacity="0.12" filter="url(#glow3)"/>
  <circle cx="280" cy="260" r="60" fill="#4f46e5" opacity="0.08" filter="url(#glow3)"/>

  <!-- Border ring -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

  <!-- Green checkmark above the text -->
  <polyline points="160,135 185,162 240,105"
            fill="none" stroke="url(#checkGrad3)" stroke-width="16"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "accepted" in white -->
  <text x="200" y="225" text-anchor="middle" dominant-baseline="central"
        font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800"
        font-size="54" fill="#ffffff" letter-spacing="-1">accepted</text>

  <!-- ".fyi" in gradient -->
  <text x="200" y="283" text-anchor="middle" dominant-baseline="central"
        font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800"
        font-size="54" fill="url(#fyiGrad3)" letter-spacing="-1">.fyi</text>
</svg>
